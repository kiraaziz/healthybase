services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES:-admin}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVICE_USER_POSTGRES:-admin} -d ${POSTGRES_DB:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      SERVICE_FQDN_MINIO_9001: ${SERVICE_FQDN_MINIO_9001:-http://localhost:9001}
      SERVICE_FQDN_MINIO_9000: ${SERVICE_FQDN_MINIO_9000:-http://localhost:9000}
      MINIO_ROOT_USER: ${SERVICE_USER_MINIO:-minioadmin}
      MINIO_ROOT_PASSWORD: ${SERVICE_PASSWORD_MINIO:-minioadmin}
      MINIO_BROWSER_REDIRECT_URL: ${SERVICE_FQDN_MINIO_9001:-http://localhost:9001}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: minio-init
    restart: on-failure
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 ${SERVICE_USER_MINIO:-minioadmin} ${SERVICE_PASSWORD_MINIO:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-database-backups};
      exit 0;
      "

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      SERVICE_FQDN_MAILPIT_8025: ${SERVICE_FQDN_MAILPIT_8025:-http://localhost:8025}
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  healthybase:
    image: kiraaziz/healthybase:latest
    container_name: nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SERVICE_FQDN_HEALTHYBASE_3000: ${SERVICE_FQDN_HEALTHYBASE_3000:-http://localhost:3000}
      APP_URL: ${SERVICE_FQDN_HEALTHYBASE_3000:-http://localhost:3000}
      NEXTAUTH_URL: ${SERVICE_FQDN_HEALTHYBASE_3000:-http://localhost:3000}
      AUTH_SECRET: ${SERVICE_BASE64_64_AUTHSECRET:-CtjCwdIBhDNzqHYTYmKaPhET0w1UiFIDAvOHkpYZy3w=}
      JOB_KEY: ${SERVICE_PASSWORD_JOBKEY:-9ef2833f5ba359ad12a94eeff56dfa4de2ddbf0c3441defa74f689637bc1dbc1}
      ENTERPRISE_EMAIL: ${ENTERPRISE_EMAIL:-support@example.com}
      DATABASE_URL: postgresql://${SERVICE_USER_POSTGRES:-admin}:${SERVICE_PASSWORD_POSTGRES:-secret}@postgres:5432/${POSTGRES_DB:-mydb}
      MINIO_URL: ${SERVICE_FQDN_MINIO_9000:-http://minio:9000}
      MINIO_ACCESS_KEY: ${SERVICE_USER_MINIO:-minioadmin}
      MINIO_SECRET_KEY: ${SERVICE_PASSWORD_MINIO:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-database-backups}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-any}
      SMTP_PASS: ${SMTP_PASS:-any}
      EMAIL_FROM: ${EMAIL_FROM:-support@example.com}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data: