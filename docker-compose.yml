services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES:-admin}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVICE_USER_POSTGRES:-admin} -d ${POSTGRES_DB:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      SERVICE_FQDN_MINIO_9001:
      SERVICE_FQDN_MINIO_9000:
      MINIO_ROOT_USER: ${SERVICE_USER_MINIO:-minioadmin}
      MINIO_ROOT_PASSWORD: ${SERVICE_PASSWORD_MINIO:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${SERVICE_USER_MINIO:-minioadmin} ${SERVICE_PASSWORD_MINIO:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-database-backups};
      exit 0;
      "

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      SERVICE_FQDN_MAILPIT_8025:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5

  healthybase:
    image: kiraaziz/healthybase:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SERVICE_FQDN_HEALTHYBASE_3000:
      APP_URL: ${SERVICE_URL_HEALTHYBASE:-http://localhost:3000}
      NEXTAUTH_URL: ${SERVICE_URL_HEALTHYBASE:-http://localhost:3000}
      AUTH_SECRET: ${SERVICE_BASE64_64_AUTHSECRET:-CtjCwdIBhDNzqHYTYmKaPhET0w1UiFIDAvOHkpYZy3w=}
      JOB_KEY: ${SERVICE_PASSWORD_JOBKEY:-9ef2833f5ba359ad12a94eeff56dfa4de2ddbf0c3441defa74f689637bc1dbc1}
      ENTERPRISE_EMAIL: ${ENTERPRISE_EMAIL:-support@example.com}
      DATABASE_URL: postgresql://${SERVICE_USER_POSTGRES:-admin}:${SERVICE_PASSWORD_POSTGRES:-secret}@postgres:5432/${POSTGRES_DB:-mydb}
      MINIO_URL: ${SERVICE_URL_MINIO:-http://minio:9000}
      MINIO_ACCESS_KEY: ${SERVICE_USER_MINIO:-minioadmin}
      MINIO_SECRET_KEY: ${SERVICE_PASSWORD_MINIO:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-database-backups}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-any}
      SMTP_PASS: ${SMTP_PASS:-any}
      EMAIL_FROM: ${EMAIL_FROM:-support@example.com}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  minio_data: